<div class="layout">

  <app-topbar></app-topbar>

  <div class="main-content">

    <app-sidebar></app-sidebar>

    <main class="feed-container">

      <div class="feed-header">
        <h1>FEED</h1>
        <p>Publicações recentes da tua comunidade.</p>
      </div>

      <app-create-post></app-create-post>

      <!-- ESTADO DE CARREGAMENTO -->
      @if (postService.posts().length === 0) {
        <div class="loading-state">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      }

      <!-- POSTS — usa @for (sintaxe Angular 17+), sem *ngFor -->
      @if (postService.posts().length > 0) {
        <div class="posts">
          @for (post of postService.posts(); track post.id) {
            <app-post-card [post]="post"></app-post-card>
          } @empty {
            <div class="empty-state">
              <i class="bi bi-wind"></i>
              <p>Ainda não há publicações. Sê o primeiro a bazar!</p>
            </div>
          }
        </div>
      }

    </main>

    <app-right-sidebar></app-right-sidebar>

  </div>

</div>
