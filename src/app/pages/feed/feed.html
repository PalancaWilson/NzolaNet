<div class="feed-layout">

  <section class="feed-main content-area">

    <div class="page-header">
      <p>// publicações da tua comunidade</p>
      <h1>FEED</h1>
    </div>

    <app-create-post></app-create-post>

    @if (postService.publicacoes().length === 0) {
      <div class="skeleton" style="height:140px;margin-bottom:14px"></div>
      <div class="skeleton" style="height:140px;margin-bottom:14px"></div>
      <div class="skeleton" style="height:140px"></div>
    } @else {
      <div class="posts-list">
        @for (post of postService.publicacoes(); track post.id) {
          <app-post-card [post]="post"></app-post-card>
        } @empty {
          <div class="empty-state">
            <i class="bi bi-wind"></i>
            <p>Nenhuma publicação ainda. Sê o primeiro a bazar!</p>
          </div>
        }
      </div>
    }

  </section>

  <aside class="right-col">
    <app-right-sidebar></app-right-sidebar>
  </aside>

</div>
