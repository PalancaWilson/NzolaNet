<h2>IDIOMA E REGIÃO</h2>
<p class="descricao-seccao">Define as tuas preferências linguísticas.</p>

<div class="linha-definicao">
  <div class="rotulo-definicao">
    <span>Idioma</span>
    <small>Idioma da interface</small>
  </div>
  <select class="select-formulario" [ngModel]="settings.idioma()" (ngModelChange)="atualizar('idioma', $event)">
    <option value="Português">Português</option>
    <option value="English">English</option>
    <option value="Français">Français</option>
    <option value="Espanhol">Espanhol</option>
  </select>
</div>

<div class="linha-definicao">
  <div class="rotulo-definicao">
    <span>Região</span>
    <small>Formato de data e hora</small>
  </div>
  <select class="select-formulario" [ngModel]="settings.regiao()" (ngModelChange)="atualizar('regiao', $event)">
    <option value="Angola">Angola</option>
    <option value="Brasil">Brasil</option>
    <option value="Portugal">Portugal</option>
    <option value="Moçambique">Moçambique</option>
  </select>
</div>
