<h2>CONTA</h2>
<p class="descricao-seccao">Actualiza os teus dados pessoais.</p>

<div class="grupo-formulario">
  <label for="nome">Nome</label>
  <input id="nome" type="text" [ngModel]="nome()" (ngModelChange)="nome.set($event)" class="input-formulario" autocomplete="name">
</div>

<div class="grupo-formulario">
  <label for="email">Email</label>
  <input id="email" type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" class="input-formulario" autocomplete="email">
</div>

<div class="grupo-formulario">
  <label for="senha">Nova palavra-passe</label>
  <input id="senha" type="password" [ngModel]="senha()" (ngModelChange)="senha.set($event)" class="input-formulario" placeholder="Deixar vazio para manter" autocomplete="new-password">
</div>

@if (salvo()) {
  <div class="alerta-sucesso">
    <i class="bi bi-check-circle-fill"></i> Dados guardados com sucesso!
  </div>
}

<button class="btn-salvar" (click)="salvar()" [disabled]="salvando()">
  @if (salvando()) {
    <span class="spinner"></span> A guardar...
  } @else {
    <i class="bi bi-check-lg"></i> Guardar Alterações
  }
</button>
