<h2>NOTIFICAÇÕES</h2>
<p class="section-desc">Controla que notificações queres receber.</p>

<div class="setting-row">
  <div class="setting-label">
    <span>Bazes</span>
    <small>Sempre que alguém der baze às tuas publicações</small>
  </div>
  <label class="switch">
    <input type="checkbox" [ngModel]="settings.notificacaoBaze()" (ngModelChange)="atualizar('notificacaoBaze', $event)">
    <span class="slider"></span>
  </label>
</div>

<div class="setting-row">
  <div class="setting-label">
    <span>Comentários</span>
    <small>Quando comentarem as tuas publicações</small>
  </div>
  <label class="switch">
    <input type="checkbox" [ngModel]="settings.notificacaoComentario()" (ngModelChange)="atualizar('notificacaoComentario', $event)">
    <span class="slider"></span>
  </label>
</div>

<div class="setting-row">
  <div class="setting-label">
    <span>Novos seguidores</span>
    <small>Alerta de novos seguidores</small>
  </div>
  <label class="switch">
    <input type="checkbox" [ngModel]="settings.notificacaoSeguidor()" (ngModelChange)="atualizar('notificacaoSeguidor', $event)">
    <span class="slider"></span>
  </label>
</div>

<div class="setting-row">
  <div class="setting-label">
    <span>Menções</span>
    <small>Quando alguém te mencionar</small>
  </div>
  <label class="switch">
    <input type="checkbox" [ngModel]="settings.notificacaoMencao()" (ngModelChange)="atualizar('notificacaoMencao', $event)">
    <span class="slider"></span>
  </label>
</div>
