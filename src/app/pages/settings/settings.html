<main class="content-area">

  <div class="page-header">
    <p>// Controla a tua experiência e o teu perfil.</p>
    <h1>DEFINIÇÕES</h1>
  </div>

  <div class="layout-definicoes">

    <aside class="menu-definicoes">
      <div
        class="item-menu"
        [class.ativo]="estaActiva('conta')"
        (click)="navegar('conta')"
      >
        <i class="bi bi-person"></i>
        <span>Conta</span>
      </div>

      <div
        class="item-menu"
        [class.ativo]="estaActiva('notificacoes')"
        (click)="navegar('notificacoes')"
      >
        <i class="bi bi-bell"></i>
        <span>Notificações</span>
      </div>

      <div
        class="item-menu"
        [class.ativo]="estaActiva('privado')"
        (click)="navegar('privado')"
      >
        <i class="bi bi-lock"></i>
        <span>Privacidade</span>
      </div>

      <div
        class="item-menu"
        [class.ativo]="estaActiva('aparencia')"
        (click)="navegar('aparencia')"
      >
        <i class="bi bi-palette"></i>
        <span>Aparência</span>
      </div>

      <div
        class="item-menu"
        [class.ativo]="estaActiva('idioma')"
        (click)="navegar('idioma')"
      >
        <i class="bi bi-globe"></i>
        <span>Idioma e Região</span>
      </div>
    </aside>

    <section class="painel-definicoes">
      <router-outlet></router-outlet>
    </section>

  </div>

</main>
