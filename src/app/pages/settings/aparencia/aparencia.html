<h2>APARÊNCIA</h2>
<p class="section-desc">Personaliza o visual da plataforma.</p>

<div class="setting-row">
  <div class="setting-label">
    <span>Modo escuro</span>
    <small>Alterna entre tema claro e escuro</small>
  </div>
  <label class="switch">
    <input type="checkbox" [ngModel]="settings.modoEscuro()" (ngModelChange)="alternarModoEscuro()">
    <span class="slider"></span>
  </label>
</div>
