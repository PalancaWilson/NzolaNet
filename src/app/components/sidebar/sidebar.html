@if (layout.sidebarAberto()) {
  <div class="sobreposicao-sidebar" (click)="layout.fecharSidebar()"></div>
}

<nav class="sidebar" [class.aberto]="layout.sidebarAberto()">
  <div class="sb-nav-label" style="padding-top: 18px">Navegação</div>
  <ul class="sb-links">
    <li>
      <a routerLink="/feed" routerLinkActive="active" (click)="navegar()">
        <i class="bi bi-house-fill"></i><span>Feed</span>
      </a>
    </li>
    <li>
      <a routerLink="/explorar" routerLinkActive="active" (click)="navegar()">
        <i class="bi bi-compass-fill"></i><span>Explorar</span>
      </a>
    </li>
    <li>
      <a routerLink="/notifications" routerLinkActive="active" (click)="navegar()">
        <i class="bi bi-bell-fill"></i><span>Notificações</span>
      </a>
    </li>
    <li>
      <a routerLink="/guardados" routerLinkActive="active" (click)="navegar()">
        <i class="bi bi-bookmark-fill"></i><span>Guardados</span>
      </a>
    </li>
    <!-- Mensagens  -->
    <!-- <li>
      <a routerLink="/mensagens" routerLinkActive="active" (click)="navegar()">
        <i class="bi bi-chat-fill"></i><span>Mensagens</span>
      </a>
    </li> -->
    <li>
      <a routerLink="/profile" routerLinkActive="active" (click)="navegar()">
        <i class="bi bi-person-fill"></i><span>Perfil</span>
      </a>
    </li>
  </ul>

  <div class="sb-nav-label" style="margin-top: 8px">Geral</div>
  <ul class="sb-links">
    <li>
      <a
        routerLink="/settings"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="navegar()"
      >
        <i class="bi bi-gear-fill"></i><span>Definições</span>
      </a>
    </li>
    @if (auth.isAdmin()) {
      <li>
        <a
          routerLink="/admin"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="navegar()"
        >
          <i class="bi bi-shield-fill"></i><span>Administração</span>
        </a>
      </li>
      <li class="sb-sub">
        <a routerLink="/admin/denuncias" routerLinkActive="active" (click)="navegar()">
          <i class="bi bi-flag-fill"></i><span>Denúncias</span>
          @if (adminService.denunciasPendentes() > 0) {
            <span class="sb-badge">{{ adminService.denunciasPendentes() }}</span>
          }
        </a>
      </li>
    }
  </ul>

  <div class="sb-bottom">
    
    <button class="btn-sair" (click)="logout()">
      <i class="bi bi-box-arrow-right"></i> Terminar Sessão
    </button>
  </div>
</nav>
