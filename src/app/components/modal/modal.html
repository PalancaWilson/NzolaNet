@if (modal.aberto()) {
  <div class="sobreposicao-modal" (click)="cancelar()">
    <div class="cartao-modal" (click)="$event.stopPropagation()">

      <div class="cabecalho-modal">
        <h3>{{ cfg()?.titulo }}</h3>
        <button class="fechar-modal" (click)="cancelar(); $event.stopPropagation()" aria-label="Fechar">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <div class="corpo-modal">
        <p>{{ cfg()?.mensagem }}</p>

        @if (cfg()?.modo === 'prompt') {
          <input
            #promptInput
            [(ngModel)]="valorInput"
            [placeholder]="cfg()?.placeholder ?? 'Escreve aqui...'"
            class="input-modal"
            (keyup.enter)="confirmar()"
          >
        }
      </div>

      <div class="rodape-modal">
        @if (cfg()?.modo === 'alert') {
          <button class="btn btn-primary" (click)="confirmar()">
            {{ cfg()?.botoes?.confirmar ?? 'OK' }}
          </button>
        } @else {
          <button class="btn btn-secondary" (click)="cancelar(); $event.stopPropagation()">
            {{ cfg()?.botoes?.cancelar ?? 'Cancelar' }}
          </button>
          <button class="btn btn-primary" (click)="confirmar(); $event.stopPropagation()">
            {{ cfg()?.botoes?.confirmar ?? (cfg()?.modo === 'prompt' ? 'Guardar' : 'Confirmar') }}
          </button>
        }
      </div>

    </div>
  </div>
}
