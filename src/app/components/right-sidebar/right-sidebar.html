<div class="interior-rs">

  <!-- QUEM SEGUIR -->
  <div class="cartao-rs">
    <h3 class="titulo-rs">QUEM SEGUIR</h3>
    <div class="utilizadores-rs">
      @for (u of suggestions; track u.id) {
        <div class="utilizador-rs">
          <img [src]="u.avatar" [alt]="u.nome" class="avatar-rs">
          <div class="info-rs">
            <span class="nome-rs">{{ u.nome }}</span>
            <span class="sub-rs">{{ u.subtitle }}</span>
          </div>
          <button class="btn-seguir-rs" [class.seguindo]="estaSeguindo(u.id)" (click)="toggleSeguir(u.id)">
            {{ estaSeguindo(u.id) ? '✓' : 'Seguir' }}
          </button>
        </div>
      }
    </div>
  </div>

  <!-- NOTIFICAÇÕES RÁPIDAS -->
  <div class="cartao-rs cartao-rs-roxo">
    <div class="cabecalho-rs">
      <h3 class="titulo-rs" style="color:#fff"><i class="bi bi-bell-fill"></i> NOTIFICAÇÕES</h3>
      <span class="ponto-rs"></span>
    </div>
    <div class="notificacoes-rs">
      @for (n of notifications; track n.id) {
        <div class="notificacao-rs">
          <div class="icone-notif-rs">
            <i [class]="getIcone(n.type)"></i>
          </div>
          <div class="texto-notif-rs">
            <p><strong>{{ n.nome }}</strong> {{ n.texto }}</p>
            <span>{{ n.tempo }}</span>
          </div>
        </div>
      }
    </div>
    <a class="ver-tudo-rs" routerLink="/notifications">VER TODAS</a>
  </div>

</div>
