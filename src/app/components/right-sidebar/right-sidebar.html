<div class="rs-inner">

  <!-- QUEM SEGUIR -->
  <div class="rs-card">
    <h3 class="rs-title">QUEM SEGUIR</h3>
    <div class="rs-users">
      @for (u of suggestions; track u.id) {
        <div class="rs-user">
          <img [src]="u.avatar" [alt]="u.nome" class="rs-avatar">
          <div class="rs-info">
            <span class="rs-name">{{ u.nome }}</span>
            <span class="rs-sub">{{ u.subtitle }}</span>
          </div>
          <button class="rs-follow-btn" [class.seguindo]="estaSeguindo(u.id)" (click)="toggleSeguir(u.id)">
            {{ estaSeguindo(u.id) ? '✓' : 'Seguir' }}
          </button>
        </div>
      }
    </div>
  </div>

  <!-- NOTIFICAÇÕES RÁPIDAS -->
  <div class="rs-card rs-card-purple">
    <div class="rs-card-header">
      <h3 class="rs-title" style="color:#fff"><i class="bi bi-bell-fill"></i> NOTIFICAÇÕES</h3>
      <span class="rs-dot"></span>
    </div>
    <div class="rs-notifs">
      @for (n of notifications; track n.id) {
        <div class="rs-notif">
          <div class="rs-notif-icon">
            <i [class]="getIcone(n.type)"></i>
          </div>
          <div class="rs-notif-text">
            <p><strong>{{ n.nome }}</strong> {{ n.texto }}</p>
            <span>{{ n.tempo }}</span>
          </div>
        </div>
      }
    </div>
    <a class="rs-view-all" routerLink="/notifications">VER TODAS</a>
  </div>

</div>
