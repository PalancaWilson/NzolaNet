<div class="sobreposicao-pesquisa" (click)="fechar()">
  <div class="cartao-pesquisa" (click)="$event.stopPropagation()">

    <div class="cabecalho-pesquisa">
      <h3><i class="bi bi-person-plus"></i> Nova conversa</h3>
      <button class="fechar-pesquisa" (click)="fechar()"><i class="bi bi-x-lg"></i></button>
    </div>

    <div class="campo-pesquisa">
      <i class="bi bi-search"></i>
      <input
        [(ngModel)]="termo"
        placeholder="Pesquisar utilizadores..."
        autofocus
      >
    </div>

    <div class="resultados-pesquisa">
      @for (u of resultados(); track u.username) {
        <button class="item-pesquisa" (click)="selecionar(u)">
          @if (u.avatar) {
            <img [src]="u.avatar" [alt]="u.nome" class="avatar-pesquisa">
          } @else {
            <div class="avatar-pesquisa iniciais-avatar-pesquisa">{{ u.nome[0] }}</div>
          }
          <div class="info-item-pesquisa">
            <span class="nome-item-pesquisa">{{ u.nome }}</span>
            <span class="utilizador-item-pesquisa">&#64;{{ u.username }}</span>
          </div>
        </button>
      } @empty {
        <div class="vazio-pesquisa">
          <i class="bi bi-emoji-frown"></i>
          <p>Nenhum utilizador encontrado</p>
        </div>
      }
    </div>

  </div>
</div>
