<header class="topbar">
  <div class="topbar-left">
    <button class="menu-hamburguer" (click)="alternarMenu()" aria-label="Menu">
      <i class="bi bi-list"></i>
    </button>
    <a routerLink="/feed" class="logo">NZOLANET</a>
  </div>

  <div class="caixa-pesquisa">
    <i class="bi bi-search" (click)="pesquisar()"></i>
    <input
      type="text"
      placeholder="Pesquisar..."
      [ngModel]="query()"
      (ngModelChange)="query.set($event)"
      (keydown.enter)="pesquisar()"
    >
  </div>

  <div class="topbar-right">
    <a routerLink="/profile" class="avatar-link" title="{{ userService.nome() }}">
      @if (userService.fotoPerfil()) {
        <img [src]="userService.fotoPerfil()" [alt]="userService.nome()" class="avatar-topbar">
      } @else {
        <div class="iniciais-topbar">{{ userService.iniciais() }}</div>
      }
    </a>
  </div>
</header>

<!-- Overlay mobile para fechar o menu ao clicar fora -->
@if (layout.sidebarAberto()) {
  <div class="overlay" (click)="alternarMenu()"></div>
}
