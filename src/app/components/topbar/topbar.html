<header class="topbar">
  <div class="topbar-left">
    <button class="menu-hamburger" (click)="alternarMenu()" aria-label="Menu">
      <i class="bi bi-list"></i>
    </button>
    <a routerLink="/feed" class="logo">NZOLANET</a>
  </div>

  <div class="search-box">
    <i class="bi bi-search"></i>
    <input type="text" placeholder="Pesquisar...">
  </div>

  <div class="topbar-right">
    <a routerLink="/profile" class="avatar-link" title="{{ userService.nome() }}">
      @if (userService.fotoPerfil()) {
        <img [src]="userService.fotoPerfil()" [alt]="userService.nome()" class="topbar-avatar">
      } @else {
        <div class="topbar-initials">{{ userService.iniciais() }}</div>
      }
    </a>
  </div>
</header>

<!-- Overlay mobile para fechar o menu ao clicar fora -->
@if (menuAberto()) {
  <div class="overlay" (click)="alternarMenu()"></div>
}
