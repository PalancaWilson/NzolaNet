<div class="create-post-card">
  <div class="post-top">

    <!-- Avatar real do utilizador -->
    @if (userService.fotoPerfil()) {
      <img [src]="userService.fotoPerfil()" [alt]="userService.nome()" class="avatar">
    } @else {
      <div class="avatar avatar-initials">{{ userService.iniciais() }}</div>
    }

    <textarea
      [ngModel]="text()"
      (ngModelChange)="text.set($event)"
      [maxlength]="limite"
      [placeholder]="'O que estás a pensar, ' + (userService.nome().split(' ')[0] || 'Baze') + '?'"
      rows="2"
    ></textarea>
  </div>

  <div class="post-bottom">
    <div class="actions">
      <button type="button" title="Imagem"><i class="bi bi-image"></i></button>
      <button type="button" title="Vídeo"><i class="bi bi-camera-video"></i></button>
      <button type="button" title="Emoji"><i class="bi bi-emoji-smile"></i></button>
      <button type="button" title="Localização"><i class="bi bi-geo-alt"></i></button>
    </div>
    <div class="post-info">
      <span class="counter" [class.danger]="quaseNoLimite">{{ restantes }}</span>
      <button
        class="publish-btn"
        type="button"
        [disabled]="!text().trim() || publicando()"
        (click)="publicar()"
      >
        @if (publicando()) { A publicar... } @else { Bazar agora }
      </button>
    </div>
  </div>
</div>

<div class="feed-tabs">
  <button class="active">Para ti</button>
  <button>A seguir</button>
  <button>Em alta</button>
</div>
