<div class="cartao-criar-publicacao">
  <div class="topo-publicacao">
    @if (userService.fotoPerfil()) {
      <img [src]="userService.fotoPerfil()" [alt]="userService.nome()" class="avatar">
    } @else {
      <div class="avatar iniciais-avatar">{{ userService.iniciais() }}</div>
    }

    <div class="area-texto">
      <textarea
        [ngModel]="text()"
        (ngModelChange)="text.set($event)"
        [maxlength]="limite"
        [placeholder]="'O que estás a pensar, ' + (userService.nome().split(' ')[0] || 'Baze') + '?'"
        rows="2"
      ></textarea>

      @if (selectedImage(); as img) {
        <div class="area-pre-visualizacao">
          <img [src]="img" class="pre-visualizacao-img">
          <button class="btn-remover-pre-visualizacao" (click)="removerImagem()" type="button">&times;</button>
        </div>
      }

      @if (selectedVideo(); as vid) {
        <div class="area-pre-visualizacao">
          <video [src]="vid" class="pre-visualizacao-video" controls></video>
          <button class="btn-remover-pre-visualizacao" (click)="removerVideo()" type="button">&times;</button>
        </div>
      }
    </div>
  </div>

  @if (showEmojiPicker()) {
    <div class="seletor-emoji">
      @for (e of emojis; track e) {
        <button type="button" class="btn-emoji" (click)="inserirEmoji(e)">{{ e }}</button>
      }
    </div>
  }

  <div class="fundo-publicacao">
    <div class="acoes">
      <button type="button" title="Imagem" (click)="imgInput.click()">
        <i class="bi bi-image"></i>
      </button>
      <input #imgInput type="file" accept="image/*" (change)="onImageSelected($event)" hidden>

      <button type="button" title="Vídeo" (click)="vidInput.click()">
        <i class="bi bi-camera-video"></i>
      </button>
      <input #vidInput type="file" accept="video/*" (change)="onVideoSelected($event)" hidden>

      <button type="button" title="Emoji" (click)="toggleEmojiPicker()">
        <i class="bi bi-emoji-smile"></i>
      </button>
      <button type="button" title="Localização" (click)="localizacao()">
        <i class="bi bi-geo-alt"></i>
      </button>
    </div>
    <div class="info-publicacao">
      <span class="contador" [class.perigo]="quaseNoLimite">{{ restantes }}</span>
      <button
        class="btn-publicar"
        type="button"
        [disabled]="!text().trim() || publicando()"
        (click)="publicar()"
      >
        @if (publicando()) { A publicar... } @else { Bazar agora }
      </button>
    </div>
  </div>
</div>

<div class="abas-feed">
  <button class="ativo">Para ti</button>
  <button>A seguir</button>
  <button>Em alta</button>
</div>
