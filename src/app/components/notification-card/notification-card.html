<div class="notif-item" [class.unread]="!notification.read">
  <!-- Unread dot -->
  <span *ngIf="!notification.read" class="unread-dot"></span>

  <!-- Avatar + type icon -->
  <div class="notif-avatar-wrap">
    <img [src]="notification.user.avatar" [alt]="notification.user.name" class="notif-avatar" />
    <span class="notif-type-icon" [ngClass]="'type-' + notification.type">
      <!-- Bolt (baze) -->
      <svg *ngIf="notification.type === 'baze'" width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <!-- Person (follow) -->
      <svg *ngIf="notification.type === 'follow'" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <!-- Chat (comment) -->
      <svg *ngIf="notification.type === 'comment'" width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <!-- @ (mention) -->
      <svg *ngIf="notification.type === 'mention'" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 006 0v-1a10 10 0 10-3.92 7.94"/>
      </svg>
    </span>
  </div>

  <!-- Text -->
  <div class="notif-content">
    <p class="notif-text">
      <strong>{{ notification.user.name }}</strong>
      {{ notification.message }}
      <span *ngIf="notification.postTitle" class="notif-post-title">{{ notification.postTitle }}</span>
    </p>
    <span class="notif-time">@{{ notification.user.username }} · {{ notification.timeAgo }}</span>
  </div>

  <!-- Follow button (only for follow type) -->
  <button *ngIf="notification.type === 'follow'" class="btn-follow">SEGUIR</button>
</div>
