<div class="item-notificacao" [class.nao-lida]="!notification.lida">

  <!-- Ponto de não lido -->
  @if (!notification.lida) {
    <span class="ponto-nao-lido"></span>
  }

  <!-- Avatar + ícone de tipo -->
  <div class="moldura-avatar-notificacao">
    <img [src]="notification.utilizador.avatar" [alt]="notification.utilizador.nome" class="avatar-notificacao">
    <span class="icone-tipo-notificacao" [class]="'tipo-' + notification.type">
      <i [class]="getTypeIcon()"></i>
    </span>
  </div>

  <!-- Texto -->
  <div class="conteudo-notificacao">
    <p class="texto-notificacao">
      <strong>{{ notification.utilizador.nome }}</strong>
      {{ notification.mensagem }}
      @if (notification.tituloPublicacao) {
        <span class="titulo-publicacao-notificacao">{{ notification.tituloPublicacao }}</span>
      }
    </p>
    <span class="tempo-notificacao">@{{ notification.utilizador.nomeUtilizador }} · {{ notification.tempoDecorrido }}</span>
  </div>

  <!-- Botão seguir (apenas para tipo follow) -->
  @if (notification.type === 'follow') {
    <button class="btn-seguir">SEGUIR</button>
  }

</div>
