<div class="notif-item" [class.unread]="!notification.lida">

  <!-- Ponto de não lido -->
  @if (!notification.lida) {
    <span class="unread-dot"></span>
  }

  <!-- Avatar + ícone de tipo -->
  <div class="notif-avatar-wrap">
    <img [src]="notification.utilizador.avatar" [alt]="notification.utilizador.nome" class="notif-avatar">
    <span class="notif-type-icon" [class]="'type-' + notification.type">
      <i [class]="getTypeIcon()"></i>
    </span>
  </div>

  <!-- Texto -->
  <div class="notif-content">
    <p class="notif-text">
      <strong>{{ notification.utilizador.nome }}</strong>
      {{ notification.mensagem }}
      @if (notification.tituloPublicacao) {
        <span class="notif-post-title">{{ notification.tituloPublicacao }}</span>
      }
    </p>
    <span class="notif-time">@{{ notification.utilizador.nomeUtilizador }} · {{ notification.tempoDecorrido }}</span>
  </div>

  <!-- Botão seguir (apenas para tipo follow) -->
  @if (notification.type === 'follow') {
    <button class="btn-follow">SEGUIR</button>
  }

</div>
