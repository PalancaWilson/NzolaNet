<div class="notif-item" [class.unread]="!notification.read">

  <!-- Ponto de não lido -->
  @if (!notification.read) {
    <span class="unread-dot"></span>
  }

  <!-- Avatar + ícone de tipo -->
  <div class="notif-avatar-wrap">
    <img [src]="notification.user.avatar" [alt]="notification.user.name" class="notif-avatar">
    <span class="notif-type-icon" [class]="'type-' + notification.type">
      <i [class]="getTypeIcon()"></i>
    </span>
  </div>

  <!-- Texto -->
  <div class="notif-content">
    <p class="notif-text">
      <strong>{{ notification.user.name }}</strong>
      {{ notification.message }}
      @if (notification.postTitle) {
        <span class="notif-post-title">{{ notification.postTitle }}</span>
      }
    </p>
    <span class="notif-time">@{{ notification.user.username }} · {{ notification.timeAgo }}</span>
  </div>

  <!-- Botão seguir (apenas para tipo follow) -->
  @if (notification.type === 'follow') {
    <button class="btn-follow">SEGUIR</button>
  }

</div>
